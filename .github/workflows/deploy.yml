name: Deploy to Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build image
        run: docker build -t us-central1-docker.pkg.dev/sincere-passage-461914-a3/my-repo/react-app:${{ github.sha }} .

      - name: Push image
        run: docker push us-central1-docker.pkg.dev/sincere-passage-461914-a3/my-repo/react-app:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy react-app-service \
            --image=us-central1-docker.pkg.dev/sincere-passage-461914-a3/my-repo/react-app:${{ github.sha }} \
            --region=us-central1 \
            --platform=managed \
            --allow-unauthenticated